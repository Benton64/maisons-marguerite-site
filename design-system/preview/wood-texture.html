<!doctype html><html><head><meta charset="utf-8"><title>Wood texture — L'Aubade</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--mm-bg); padding: 24px 36px; box-sizing: border-box; min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: center; }
  .panel { padding: 26px; height: 230px; border: 1px solid var(--mm-border); background: var(--mm-bg-alt); border-radius: 2px; display: flex; flex-direction: column; justify-content: space-between; }
  .panel.wood { /* mm-wood applied directly */ }
  .label { font-family: var(--mm-font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mm-bronze); }
  .h { font-family: var(--mm-font-display); font-style: italic; font-size: 28px; color: var(--mm-forest); letter-spacing: 0.02em; }
  .meta { font-family: var(--mm-font-body); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mm-bronze); }
</style></head>
<body class="mm-base">
  <div class="panel">
    <div class="label">Niveau 1 — bronze</div>
    <div class="h">Sans texture</div>
    <div class="meta">Partout sur le site</div>
  </div>
  <div class="panel mm-wood">
    <div class="label">Niveau 2 — bois 10%</div>
    <div class="h">L'Aubade</div>
    <div class="meta">Petits matins · table d'hôte</div>
  </div>
</body></html>
