<!doctype html><html><head><meta charset="utf-8"><title>Form — Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--mm-bg); padding: 28px 40px; box-sizing: border-box; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; gap: 14px; max-width: 560px; margin: 0 auto; }
  label { font-family: var(--mm-font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mm-bronze); display: block; margin-bottom: 6px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
</style></head>
<body class="mm-base">
  <div>
    <label>Votre nom</label>
    <input class="mm-input" placeholder="Marguerite Dubois">
  </div>
  <div class="grid">
    <div><label>Arrivée</label><input class="mm-input" value="14 juin 2026"></div>
    <div><label>Départ</label><input class="mm-input" value="21 juin 2026"></div>
  </div>
</body></html>
