<!doctype html><html><head><meta charset="utf-8"><title>Color — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: #fff; padding: 24px; box-sizing: border-box; min-height: 100vh; display: grid; place-items: center; }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; width: 660px; height: 230px; border: 1px solid var(--mm-border); }
  .sw { padding: 18px; display: flex; flex-direction: column; justify-content: space-between; }
  .name { font-family: var(--mm-font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
  .hex { font-family: var(--mm-font-body); font-size: 13px; }
  .role { font-family: var(--mm-font-italic); font-style: italic; font-size: 16px; margin-top: 4px; }
</style></head>
<body class="mm-base">
  <div class="row">
    <div class="sw" style="background:#F7F3EC; color:#2D4A3E;">
      <div><div class="name">Linen</div><div class="role">Page background</div></div>
      <div class="hex">#F7F3EC</div>
    </div>
    <div class="sw" style="background:#FAFAF8; color:#2D4A3E;">
      <div><div class="name">Ivory</div><div class="role">Section alt</div></div>
      <div class="hex">#FAFAF8</div>
    </div>
    <div class="sw" style="background:#E8F0EC; color:#2D4A3E;">
      <div><div class="name">Forêt pâle</div><div class="role">Card hover</div></div>
      <div class="hex">#E8F0EC</div>
    </div>
  </div>
</body></html>
