<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--mm-bg); padding: 28px 40px; box-sizing: border-box; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 22px; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .lbl { font-family: var(--mm-font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mm-bronze); }
</style></head>
<body class="mm-base">
  <div class="row">
    <a class="mm-btn mm-btn--primary">Réserver un séjour</a>
    <a class="mm-btn mm-btn--ghost">Découvrir</a>
    <a class="mm-btn mm-btn--link">Voir la maison →</a>
  </div>
  <div class="lbl">Primary · Ghost · Link — DM Sans 500, uppercase, 2px radius</div>
</body></html>
