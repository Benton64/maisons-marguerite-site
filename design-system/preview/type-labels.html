<!doctype html><html><head><meta charset="utf-8"><title>Type — Label & Petites capitales</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--mm-bg); padding: 28px 40px; box-sizing: border-box; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; gap: 22px; }
  .meta { font-family: var(--mm-font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mm-bronze); }
  .label { font-family: var(--mm-font-body); font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mm-bronze); }
  .pcap { font-family: var(--mm-font-body); font-size: 17px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mm-forest); }
  hr { border: 0; height: 1px; background: var(--mm-border); margin: 0; }
</style></head>
<body class="mm-base">
  <div>
    <div class="meta" style="margin-bottom:8px;">Label · DM Sans 500 · 13px · LS 0.08em</div>
    <div class="label">Nos maisons · Réserver un séjour</div>
  </div>
  <hr>
  <div>
    <div class="meta" style="margin-bottom:8px;">Petites capitales · LS 0.18em</div>
    <div class="pcap">Maison Périgord · Appartement Biarritz</div>
  </div>
</body></html>
