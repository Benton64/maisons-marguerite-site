<!doctype html><html><head><meta charset="utf-8"><title>Type — Scale ladder</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--mm-bg); padding: 22px 40px; box-sizing: border-box; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
  .row { display: grid; grid-template-columns: 70px 1fr; gap: 24px; align-items: baseline; }
  .meta { font-family: var(--mm-font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mm-bronze); }
  .s { font-family: var(--mm-font-display); font-weight: 400; color: var(--mm-forest); letter-spacing: 0.02em; line-height: 1; }
  .b { font-family: var(--mm-font-body); color: var(--mm-ink); }
</style></head>
<body class="mm-base">
  <div class="row"><div class="meta">H1 · 64</div><div class="s" style="font-size:48px;">Trois maisons</div></div>
  <div class="row"><div class="meta">H2 · 40</div><div class="s" style="font-size:34px;">Une longère sous les tilleuls</div></div>
  <div class="row"><div class="meta">H3 · 28</div><div class="s" style="font-size:24px;">L'Aubade — petits matins</div></div>
  <div class="row"><div class="meta">Body · 17</div><div class="b" style="font-size:16px;">On y reste plus longtemps qu'on ne l'avait prévu.</div></div>
  <div class="row"><div class="meta">Label · 13</div><div class="b" style="font-size:12px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--mm-bronze);">Découvrir la maison</div></div>
</body></html>
