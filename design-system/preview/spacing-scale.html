<!doctype html><html><head><meta charset="utf-8"><title>Spacing — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--mm-bg); padding: 24px 40px; box-sizing: border-box; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
  .row { display: grid; grid-template-columns: 80px 60px 1fr; gap: 16px; align-items: center; }
  .name { font-family: var(--mm-font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mm-bronze); }
  .val { font-family: var(--mm-font-body); font-size: 13px; color: var(--mm-ink); }
  .bar { height: 14px; background: var(--mm-bronze); opacity: 0.85; }
</style></head>
<body class="mm-base">
  <div class="row"><div class="name">space-1</div><div class="val">4 px</div><div class="bar" style="width:4px;"></div></div>
  <div class="row"><div class="name">space-2</div><div class="val">8 px</div><div class="bar" style="width:8px;"></div></div>
  <div class="row"><div class="name">space-3</div><div class="val">12 px</div><div class="bar" style="width:12px;"></div></div>
  <div class="row"><div class="name">space-4</div><div class="val">16 px</div><div class="bar" style="width:16px;"></div></div>
  <div class="row"><div class="name">space-5</div><div class="val">24 px</div><div class="bar" style="width:24px;"></div></div>
  <div class="row"><div class="name">space-6</div><div class="val">32 px</div><div class="bar" style="width:32px;"></div></div>
  <div class="row"><div class="name">space-7</div><div class="val">48 px</div><div class="bar" style="width:48px;"></div></div>
  <div class="row"><div class="name">space-8</div><div class="val">64 px</div><div class="bar" style="width:64px;"></div></div>
  <div class="row"><div class="name">space-9</div><div class="val">96 px</div><div class="bar" style="width:96px;"></div></div>
  <div class="row"><div class="name">space-10</div><div class="val">128 px</div><div class="bar" style="width:128px;"></div></div>
</body></html>
