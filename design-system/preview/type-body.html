<!doctype html><html><head><meta charset="utf-8"><title>Type — Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--mm-bg); padding: 26px 40px; box-sizing: border-box; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; gap: 12px; }
  .meta { font-family: var(--mm-font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mm-bronze); }
  .body { font-family: var(--mm-font-body); font-weight: 400; font-size: 17px; line-height: 1.65; color: var(--mm-ink); max-width: 600px; text-wrap: pretty; }
</style></head>
<body class="mm-base">
  <div class="meta">DM Sans · 400 · 17 / 16 px · LH 1.6</div>
  <p class="body">La maison se découvre lentement. Une porte cochère, un couloir de tomettes, deux marches que l'on prend sans y penser, puis le jardin qui se révèle, immense, à la française. On y reste plus longtemps qu'on ne l'avait prévu.</p>
</body></html>
