<!doctype html><html><head><meta charset="utf-8"><title>Color — Bronze</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--mm-bg); padding: 24px; box-sizing: border-box; min-height: 100vh; display: grid; place-items: center; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0; width: 660px; height: 230px; }
  .sw { padding: 22px; display: flex; flex-direction: column; justify-content: space-between; }
  .name { font-family: var(--mm-font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
  .hex { font-family: var(--mm-font-body); font-size: 13px; }
  .role { font-family: var(--mm-font-italic); font-style: italic; font-size: 18px; margin-top: 4px; }
</style></head>
<body class="mm-base">
  <div class="row">
    <div class="sw" style="background:#8B6F4E; color:#FAFAF8;">
      <div><div class="name">Bronze</div><div class="role">Accents · icons · labels</div></div>
      <div class="hex">#8B6F4E</div>
    </div>
    <div class="sw" style="background:#D4C5B0; color:#2D4A3E;">
      <div><div class="name">Bronze tendre</div><div class="role">Borders · texte sur forêt</div></div>
      <div class="hex">#D4C5B0</div>
    </div>
  </div>
</body></html>
