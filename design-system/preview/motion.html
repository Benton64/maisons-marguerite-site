<!doctype html><html><head><meta charset="utf-8"><title>Motion easing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--mm-bg); padding: 24px 40px; box-sizing: border-box; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; gap: 18px; }
  .row { display: grid; grid-template-columns: 110px 1fr 120px; gap: 18px; align-items: center; }
  .name { font-family: var(--mm-font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mm-bronze); }
  .meta { font-family: var(--mm-font-body); font-size: 11px; color: var(--mm-ink); }
  .track { position: relative; height: 28px; background: var(--mm-bg-alt); border: 1px solid var(--mm-border); border-radius: 2px; overflow: hidden; }
  .dot { position: absolute; top: 4px; left: 4px; width: 20px; height: 20px; background: var(--mm-forest); border-radius: 50%; animation-duration: 2200ms; animation-iteration-count: infinite; animation-direction: alternate; }
  .e1 { animation-name: glide; animation-timing-function: cubic-bezier(0.22, 0.61, 0.36, 1); }
  .e2 { animation-name: glide; animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
  .e3 { animation-name: glide; animation-timing-function: linear; }
  @keyframes glide { to { left: calc(100% - 24px); } }
</style></head>
<body class="mm-base">
  <div class="row"><div class="name">--ease</div><div class="track"><div class="dot e1"></div></div><div class="meta">.22, .61, .36, 1</div></div>
  <div class="row"><div class="name">--ease-out</div><div class="track"><div class="dot e2"></div></div><div class="meta">.16, 1, .3, 1</div></div>
  <div class="row"><div class="name">linear</div><div class="track"><div class="dot e3"></div></div><div class="meta">à éviter</div></div>
</body></html>
