<!doctype html><html><head><meta charset="utf-8"><title>Radii & Borders</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--mm-bg); padding: 24px 40px; box-sizing: border-box; min-height: 100vh; display: flex; align-items: center; justify-content: space-around; gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .swatch { width: 92px; height: 92px; background: var(--mm-bg-alt); border: 1px solid var(--mm-border); }
  .name { font-family: var(--mm-font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mm-bronze); }
  .val { font-family: var(--mm-font-body); font-size: 12px; color: var(--mm-ink); }
</style></head>
<body class="mm-base">
  <div class="item"><div class="swatch" style="border-radius:0;"></div><div class="name">None</div><div class="val">0 px</div></div>
  <div class="item"><div class="swatch" style="border-radius:2px;"></div><div class="name">Small</div><div class="val">2 px</div></div>
  <div class="item"><div class="swatch" style="border-radius:4px;"></div><div class="name">Card</div><div class="val">4 px</div></div>
  <div class="item"><div class="swatch" style="border-radius:999px; width:140px; height:44px;"></div><div class="name">Pill</div><div class="val">tag chips</div></div>
</body></html>
