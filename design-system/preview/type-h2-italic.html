<!doctype html><html><head><meta charset="utf-8"><title>Type — Display H2 + Italic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--mm-bg); padding: 28px 40px; box-sizing: border-box; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
  .meta { font-family: var(--mm-font-body); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mm-bronze); }
  .h2 { font-family: var(--mm-font-display); font-weight: 400; font-size: 40px; line-height: 1.15; letter-spacing: 0.02em; color: var(--mm-forest); }
  .it { font-family: var(--mm-font-display); font-style: italic; font-weight: 400; font-size: 26px; color: var(--mm-bronze); margin-top: 4px; }
</style></head>
<body class="mm-base">
  <div class="meta">Cormorant 40 / 28 px · italic en accent</div>
  <div class="h2">Une longère sous les tilleuls</div>
  <div class="it">— quatre chambres, six invités, un verger de mirabelliers.</div>
</body></html>
