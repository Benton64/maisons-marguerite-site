<!doctype html><html><head><meta charset="utf-8"><title>Property tile (composite)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--mm-bg); padding: 22px; box-sizing: border-box; min-height: 100vh; display: grid; place-items: center; }
  .tile { width: 380px; }
  .photo { aspect-ratio: 4/5; position: relative; background:
    radial-gradient(120% 80% at 30% 25%, rgba(255,236,200,0.6), transparent 60%),
    linear-gradient(160deg, #C7B89E, #6A5236 70%, #2D4A3E);
    border-radius: 2px; overflow: hidden; }
  .photo::after { content: ""; position: absolute; inset: auto 0 0 0; height: 30%; background: linear-gradient(to top, rgba(45,74,62,0.55), transparent); }
  .badge { position: absolute; top: 16px; left: 16px; padding: 4px 10px; background: var(--mm-bg); font-family: var(--mm-font-body); font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mm-forest); }
  .overlay { position: absolute; left: 18px; bottom: 16px; right: 18px; color: var(--mm-paper); z-index: 1; }
  .ovname { font-family: var(--mm-font-display); font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; }
  .meta { padding-top: 14px; display: flex; justify-content: space-between; align-items: baseline; }
  .name { font-family: var(--mm-font-display); font-style: italic; font-size: 24px; color: var(--mm-forest); }
  .small { font-family: var(--mm-font-body); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mm-bronze); }
</style></head>
<body class="mm-base">
  <div class="tile">
    <div class="photo">
      <div class="badge">Périgord</div>
      <div class="overlay"><div class="ovname">Maison Périgord</div></div>
    </div>
    <div class="meta"><div class="name">Une longère sous les tilleuls</div></div>
    <div class="meta"><div class="small">6 invités · 4 chambres</div><div class="small">à partir de mai →</div></div>
  </div>
</body></html>
